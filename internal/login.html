<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal Internal · Yosi Hutama Karya</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/style.css?v=2" />
</head>
<body style="background: var(--yk-black); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">

<div style="max-width: 440px; width: 100%;">
  <div style="text-align: center; margin-bottom: 32px;">
    <img src="../assets/yk-logo.svg" alt="YK Logo" width="80" height="80" style="margin: 0 auto 16px; display: block; object-fit: contain; filter: invert(1) brightness(2);" />
    <h2 style="color: #fff; font-size: 1.5rem;">Portal Internal Karyawan</h2>
    <p style="color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 6px;">PT. Yosi Hutama Karya</p>
  </div>

  <div class="card" style="padding: 32px;">
    <form id="login-form">
      <label>Email Karyawan</label>
      <input type="email" name="email" required placeholder="nama@yosihutamankarya.com" value="ardi.kemara1@gmail.com" />

      <label style="margin-top: 16px;">Password</label>
      <input type="password" name="password" placeholder="(prototype, password tidak dicek)" value="demo123" />

      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 24px;">Masuk ke Portal</button>
      <p id="login-error" style="color: var(--yk-danger); font-size: 13px; margin-top: 12px; display: none;"></p>
    </form>

    <div class="panel" style="margin-top: 24px; padding: 14px 16px; font-size: 12px; background: #FEF3C7; border: 1px solid #FCD34D; border-left: 3px solid #D97706;">
      <strong style="color: #D97706;">DEMO MODE:</strong> Password tidak dicek. Email harus terdaftar di Settings → Users.
      <div style="margin-top: 8px; font-size: 11px; color: var(--yk-grey);">
        Akun demo: <code>ardi.kemara1@gmail.com</code> (admin), <code>staff@yosihutamankarya.com</code> (staff), <code>finance@yosihutamankarya.com</code> (finance)
      </div>
    </div>
  </div>

  <div style="text-align: center; margin-top: 24px;">
    <a href="../index.html" style="color: rgba(255,255,255,0.6); font-size: 13px;">← Kembali ke website publik</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-config.js"></script>
<script src="../shared/db.supabase.js"></script>
<script src="../shared/access.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const email = fd.get('email');
    const btn = e.target.querySelector('button[type="submit"]');
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Mencari akun…';

    const user = await DB.signInByEmail(email);

    if (!user) {
      btn.disabled = false; btn.textContent = 'Masuk ke Portal';
      err.textContent = 'Email tidak terdaftar atau akun di-nonaktifkan. Minta admin tambahkan via Settings.';
      err.style.display = 'block';
      return;
    }

    DB.setUser({
      id: user.id,
      email: user.email,
      name: user.name,
      role: user.role,
      loginAt: new Date().toISOString()
    });

    // Redirect to role-appropriate home
    location.href = roleHome(user.role);
  });
</script>
</body>
</html>
